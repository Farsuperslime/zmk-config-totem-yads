include:
  - board:  xiao_ble//zmk
    shield: totem_left
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DMIRYOKU_ALPHAS=COLEMAKDH
    artifact-name: totem-miryoku-dongle-left

  - board:  xiao_ble//zmk
    shield: totem_right
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DMIRYOKU_ALPHAS=COLEMAKDH
    artifact-name: totem-miryoku-dongle-right

  - board:  xiao_ble//zmk
    shield: totem_left
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DMIRYOKU_ALPHAS=COLEMAKDH
